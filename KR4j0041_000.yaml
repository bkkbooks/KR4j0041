body:
  text: 提要西樵語業詞曲類一詞集之屬臣等謹案西樵語業一卷宋楊炎正撰炎正字濟翁廬陵人陳振孫書録解題載西樵語業一卷楊炎正濟翁撰馬端臨文獻通考引之誤以正字為止字毛晉刻六十家詞遂誤以楊炎為姓名以止濟翁為别號近時所印又改刋楊炎正姓名跋中止濟翁字亦追改為楊濟翁然舊印之本與新印之本並行名字兩岐頗滋疑惑故厲鶚宋詩紀事辨之曰嘗見西樵語業舊抄本作楊炎正濟翁後考武林舊事載楊炎正錢唐迎酒歌一首全芳備祖亦載此詩稱楊濟翁是炎正其名而濟翁其字云云今觀辛棄疾稼軒詞中屢有與楊濟翁贈答之作其水調歌頭一闋自注云舟次揚州和揚濟翁韻而炎正是調登多景樓一闋其韻正與辛作相同惟尾句一韻互異又棄疾蝶戀花二闋亦注云和楊濟翁韻惟第二闋昨日解酲今夕又句棄疾詞作可惜春殘風又雨蓋皆傳寫之誤其所稱濟翁之字則足證厲鶚所辨為不誤而毛氏舊印之本為不足憑矣是集僅三十七首而因辛棄疾作者凡六首當時兩人交好可知其縱橫排奡之氣雖不足敵棄疾而屏絶纎穠自抒清俊要非俗艷所可擬一時投契蓋亦有由云樵隱詞詞曲類一詞集之屬臣等謹案樵隱詞一卷宋毛幵撰幵字平仲信安人舊刻題曰三衢蓋偶從古名也嘗為宛陵東陽二州倅所著有樵隱集十五卷尤袤為之序今已不傳陳振孫書録解題載樵隱詞一卷此刻計四十二首據毛晉跋謂得自楊夢羽家祕藏抄本不知即振孫所見否也幵他作不甚著而小詞最工卷首王木叔題詞有或病其詩文視樂府頗不逮之語蓋當時已有定論矣集中滿江紅潑火初收一闋尤為清麗芊眠故楊慎詞品特為激賞其江城子一闋注次葉石林韻後半爭勸紫髯翁句實押翁字而今本石林詞此句乃押宫字于本詞為復用可訂石林詞刋本之訛至于瑞鶴仙一調宋人諸本並同此本乃題與目録俱訛作瑞仙鶴又燕山亭前闋密映窺亭亭萬枝開遍句止九字考曽覿此調作寒壘宣威紫綬幾垂金印共十字則窺字上下必尚脫一字尾句愁酒醒緋千片止六字曽覿此調作長占取朱顔緑鬢共七字則緋字上下又必尚脫一字其餘如滿庭芳第一首注中東陽之訛東易第三首注中西安之訛四安魯魚糾紛則毛本校讐之疏矣陳正晦遁齋間覽載幵為郡因陳牒婦人立雨中作清平調一詞事既媟褻且幵亦未嘗為郡此宋人小説之誣晉不收其詞特為有識今附辨于此亦不復補入云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
