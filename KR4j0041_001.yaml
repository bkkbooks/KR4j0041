body:
  text: 西樵語業宋楊炎正撰水調歌頭登多景樓寒眼亂空闊客意不勝秋強呼斗酒發興特上最高樓舒卷江山圖畫應答龍魚悲嘯不暇顧詩愁風露巧欺客分冷入衣裘忽醒然成感慨望神州可憐報國無路空白一分頭都把平生意氣只做如今憔悴歲晚若為謀此意仗江月分付與沙鷗又呈辛隆興杖履覓春色行遍大江西訪花問桞都自無語欲成蹊不道七州三壘今歲五風十雨全是太平時征轡晚乘月漁釣夜垂絲詩書帥坐圍玉麈揮犀興方不淺領袖風月過花期只恐梅梢青子已露調羮消息金鼎待公歸回首滕王閣空對落霞飛又送張使君父老一杯酒爭勸使君留可憐桃李千樹無語送歸舟聽得拈笙玉指都把萬家遺愛吹作别離愁倚醉袖紅溼生怕夕陽流問君侯今幾日到東州還家時候次第梅已暗香浮只恐道間驛使先寄調羮消息歸去總無由鼎鉉功名了徐赴赤松遊又呈趙總領買得一航月醉臥出長安平堤千里過盡楊柳緑隂間依約曉鶯啼處認得南徐風物客夢恍驚殘重到舊遊所如把畫圖看英雄事千古意一憑闌惜今老矣無復健筆寫江山天上人間知已賴有使星郎宿照映此塵寰準擬五湖去為乞釣魚竿又把酒對斜日無語問西風胭脂何事都做顔色染芙蓉放眼暮江千頃中有離愁萬斛無處落征鴻天在闌干角人倚醉醒中千萬里江南北浙西東吾生如寄尚想三徑菊花叢誰是中州豪傑借我五湖舟楫去作釣魚翁故國且回首此意莫匆匆又一笛起城角吹破小梅愁東風猶未誰遣春信到吾州聞得東來千騎鼓舞兒童竹馬和氣與空浮桃李未隂處準擬種千頭今太守宋人物晉風流政成談笑不妨高興在南樓只恐蓬萊仙伯合侍玉皇香案難作寇恂留約住紫泥路憑軾且優遊又踏碎九街月乘醉出京華半生湖海誰念今日老還家獨把瓦盆盛酒自與漁樵分席説尹政聲佳竹馬望塵去倦客亦隨車聽薰風清曉角韻梅花人家十萬説盡炎熱與咨嗟只恐棠隂未滿已有楓宸趣召歸路不容遮回首江邊桞空著舊棲鴉滿江紅春入臺門又見染桞絲新緑對此景一年為夀一番添福莫怪鳯池頒詔晚要教淮水恩波足聽邊民千歲頌聲中重重祝堂萱茂庭芝馥歌倚扇杯持玉共勸君一醉滿斟醽醁今夜東風吹酒醒明朝萬里騎黃鵠向九霞光裏望宸輝看除目又筆染相思暗題盡朱門白壁動離思春生逺岸煙銷殘日楊桞結成羅帶恨海棠染就胭脂色想深情幽怨繡屏間雙鸂鶒春水緑春山碧花有恨人無力對一奩愁思九分孤寂寸寸錦腸渾欲斷盈盈玉淚應偷滴倩東風吹雁過江南傳消息又夀架軒夀酒如澠拚一醉勸君休惜君不記濟河津畔當年今夕萬丈文章光焰裏一星飛墮從南極便御風乘興入京華班卿棘君不是長庚白又不是嚴陵客只應是明主夢中良弼好把袖間經濟手如今去補天西北等瑶池侍宴夜歸時騎箕翼又典盡春衣也應是京華倦客都不記麯塵香霧西湖南陌兒女别時和淚拜牽衣曾問歸時節到歸來稚子已成隂空頭白功名事雲霄隔英雄伴東南拆對雞豚社酒依然鄉國三徑不成陶令隱一區未有揚雄宅問漁樵學作老生涯從今日瑞鶴仙元夕為王使君賦風光開舊眼正梅雪初消桞絲新染樓臺競裝點照金荷十里珠簾齊捲湘絃楚管動香風旌旗影轉望雲間一點台星飛下洞天清晚爭看袖紅圍坐舞翠回春笑歌生暖歡聲正逺嬉遊意未容懶恐絲綸趣召清都仙伯歸去朝天夜半倩邦人挽取鼇頭醉扶玉腕賀新郎十月狂風雨掃園林紅香萬點送春歸去獨有荼䕷開未到留得一分春住早楊桞趂晴飛絮可奈暖埃欺晝永試薄羅衫子輕如霧驚舊恨到睂宇東風臺榭知何處問燕鶯如今尚有春光幾許可殺一年遊賞倦放得無情露醑為喚取扇歌裙舞乞得風光還兩眼待為君滿把金杯舉扶醉玉伴揮塵又寄辛潭州夢裏驂鸞馭望蓬萊不逺翩然被風吹去吹到楚樓煙月上不記人間何處但疑是蓬壺别所縹眇霓裳天女隊奉一仙滿把流霞舉如喚我醉中舞醉醒夢覺知何許問瀟湘今日誰與主盟樽爼無限青春難老意擬倩管絃寄與待新築沙堤穩步萬里雲霄都歷遍却依前流水桃源路留此筆為君賦念奴嬌漢天雲靜望一星飛過湘南湘北當是郴山猿鶴夢喚起日邊消息羽扇綸巾浩然乘興此意無人識扁舟千里但聞清夜橫笛記得天上人間去年今日曾作稱觴客明月風煙依舊似只覺蓬萊懸隔更恐明朝韶黃飛下趣駕沖霄翼衮衣劎履望公長在南極又杏花楊桞對東風染盡一年春色彈壓煙光三萬頃誰識清都仙伯夜泛銀潢手移星緯飛墮從天闕御風乘興偶然身到鄉國二年人樂升平舞臺歌榭處處紅牙拍夀酒千觴斟不盡一醉何妨今夕更約明年鳯皇池上去作稱觴客梅花折得贈君調鼎消息洞仙歌芙蓉開了春未江梅透小小東風弄晴晝把萬家和氣吹入笙歌爐薰裏都與慈闈做夀黃堂今日貴自著萊衣捧勸金船十分酒願從今江海上日日韶華桃李徑總為人間種就但看取天邉老人星有一點台星共光南斗又夀稼軒帶湖佳處髣佛真蓬島曾對金樽伴芳草見桃花流水别是春風笙歌裏誰信東君會老功名都莫問總是神仙買斷風光鎮長好但如今經國手袖裏偷間天不管怎得關河事了待貌取精神上凌煙却旋買扁舟歸來趁早鵲橋仙思歸時節乍寒天氣總是離人愁緒夜來無奈被西風更吹做一簾秋雨征衫拂淚闌干倚醉羞對黃花無語寄書除是鴈來時又只恐書成鴈去又夀稼軒築成臺榭種成花桞更又教成歌舞不知誰為帶湖仙收拾盡壺天風露間中得味酒中得趣只恐天還也妬青山縱買萬千重遮不斷詔書來路蝶戀花别范南伯離恨做成春夜雨添得春江剗地東流去弱桞繫船都不住為君愁絶聽鳴櫓君到南徐芳草渡想得尋春依舊當年路後夜獨憐回首處亂山遮莫無重數又稼軒坐間作首句用丘六書中語點撿笙歌多釀酒不放東風獨自迷楊桞院院翠隂停永晝曲欄隨處堪埀手昨日解酲今夕又消得情懷長被春僝僽門外馬嘶人去後亂紅不管花消瘦又萬點飛花愁似雨峭殺輕寒不會留春住滿地亂紅風掃聚只教燕子銜將去獨倚闌干間自覻深院無人行到無情處簾外絲絲楊桞舞又還裝點人情緒千秋歲代人為夀五雲縹眇朝退金門曉歸未穩傳宣到龍樓陪夕宴鳯沼吟春草人間世誰知自有蓬萊島一杯宜勸了換得天顔笑人不老春長好從今千百歲總是中書考瑶池會金盤剩薦安期棗玉人歌風西起又老盡籬花寒輕香細漫題紅葉句裏意誰會長天不恨江南逺苦恨無書寄最相思盤橘千枚膾鱸十尾鴻鴈阻歸計算愁滿離腸十分豈止倦倚闌干顧影在天際凌煙圖畫青山約總是浮生事判從今買取朝醒夕醉點絳唇邂逅開尊眼中有個人纖軟袖羅輕轉玉腕回春暖韻處無多只惱人腸斷詞將半近前相勸撲撲清香滿又送别洪才之水載離懷暮帆吹月寒欺酒楚梅春透忍放持杯手莫唱陽關免溼盈盈袖君行後那人消瘦不惱詩腸否秦樓月東風寂垂楊舞困春無力春無力落紅不管杏花狼籍斷腸芳草萋萋碧新來怪底相思極相思極冷煙池館又將寒食浣溪沙楊桞籠煙裊嫩黃桃花蘸水染紅香薄羅衫子日初長飲盡東風三百盞醉來愁斷幾回腸教人獨自遣風光又三徑間情傲落霞五湖高興不浮家自斟北斗浸丹砂間把胸中千澗壑撰成醉處一生涯雪樓風月篆裏花桃源憶故人尊前未語睂先皺只把橫波斜溜此意問春知否蝶困蜂兒瘦􅀈膎呷下些來酒越會把人僝僽有箇約伊時候夢裏來相就踏莎行宿鷺棲身飛鴻點淚不堪更是重陽到一襟無處著淒涼倚欄看盡斜陽倒瘦減難豐悲傷易老淡觴消得黃花笑畫睂人去玉箆存濃愁如黛慿誰掃減字木蘭花月明如晝占斷小樓供把酒入眼人人如月精神更有情大家休睡留到天明和月醉生怕醒來月到波心憶酒媒生查子金蓮照夜紅玉腕扶春碧曲妙遏雲行人好欺花色歡生酒面濃笑染爐香溼飲盡十玻璃月墮東方白桞梢青生紫衫兒影金領子著得偏宜步穩金蓮香薰紈扇舞轉花枝捧杯更著􅀈膎唱一箇新行耍詞玉骨氷肌好天良夜怎不憐伊相見歡江湖萬里征鴻再相逢多少風煙摸在笑談中歌裙醉羅巾淚别愁濃瘦減腰圍不礙帶金重訴𠂻情露珠點點欲團霜分冷與紗窗錦書不到腸斷煙水隔茫茫征燕盡塞鴻翔睇風檣闌干曲處又是一番倚盡斜陽西樵語業跋楊濟翁廬陵人也西樵乃清海府城西山名相去數百里或曰曾流寓於此因以名集今亦無傳但其語業一卷俊逸可喜不作妖艷情態雖非詞家能品其品之間間可想見云湖南毛晉識
